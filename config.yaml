riot:
  region: "la1"
  routing_region: "americas"
  queue: "RANKED_SOLO_5x5"
  tier: "DIAMOND"
  division: "I"
  page: 1

matches:
  matchtype: "ranked"
  queueid: 420
  start: 1
  count: 5
  sleep_seconds: 1.5

paths:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  database_dir: "data/database"
  sample_matches_csv: "data/raw/sample_matches.csv"
  sample_apex_enriched_csv: "data/processed/sample_apex_enriched.csv"
  dfinfo_csv: "data/processed/dfinfo_apex_enriched.csv"
  predictor_db: "data/database/predictor.db"
  predictions_csv: "data/processed/predictions.csv"

files:
  ladder_population: "ladder_population.csv"
  sample_matches: "sample_matches.csv"
  sample_enriched: "sample_apex_enriched.csv"
  temp_matches: "temp_matches.csv"

model:
  target_column: "my_team_win"

  features:
    - "gold_diff"
    - "kill_diff"
    - "my_team_tower_fb"
    - "my_team_drake_fb"
    - "my_team_herald_fb"

  test_size: 0.2
  random_state: 42
  threshold: 0.5

plots:
  figures_dir: "reports/figures"

artifacts:
  model_dir: "models"
  scaler_name: "scaler.pkl"
  model_name: "logreg_model.pkl"

